<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <title>LabPilotPro – LP logo (dark sky blue with padding)</title>
  <desc>Bold white letters L and P on dark sky blue background with comfortable padding.</desc>

  <!-- dark sky blue background -->
  <rect width="500" height="500" fill="#4A90E2" />

  <!-- ========== LETTER L (stylized, bold) ========== -->
  <!-- vertical stem -->
  <rect x="100" y="120" width="60" height="260" rx="30" ry="30" fill="#FFFFFF" />
  <!-- horizontal base -->
  <rect x="100" y="320" width="160" height="60" rx="30" ry="30" fill="#FFFFFF" />

  <!-- ========== LETTER P (stylized, bold) ========== -->
  <!-- vertical stem -->
  <rect x="300" y="120" width="60" height="260" rx="30" ry="30" fill="#FFFFFF" />
  <!-- bowl (rounded rectangle attached at top right) -->
  <rect x="340" y="120" width="120" height="150" rx="60" ry="60" fill="#FFFFFF" />
</svg>